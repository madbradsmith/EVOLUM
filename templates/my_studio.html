<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
<div class="logo">
    <img src="/static/logo.png" class="logo-img">
</div>

<div class="shell">
<div class="card">

    <div class="workspace-title" style="text-align:center;">
        MY STUDIO
    </div>

    <div class="workspace-copy" style="text-align:center; margin-bottom:12px;">
        Peace, {{ user_name or "Creator" }}.
    </div>

    <div style="margin-top:14px;">
        <div class="choice-title">My Projects</div>

        <div class="complete-copy" style="margin-top:10px;">
            No saved projects yet. Start creating.
        </div>
    </div>

    <div style="margin-top:12px; text-align:center;">
        <a href="/" class="secondary-button" style="text-decoration:none;padding:12px 18px;display:inline-block;">Home</a>
    </div>

</div>
</div>
</div>

</body>
</html>
