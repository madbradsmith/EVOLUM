<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLUM Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="menu-toggle">
☰
</div>

<div class="feedback-fab">
    <div class="feedback-fab-icon">💬</div>
    <div class="feedback-fab-text">
        <div class="feedback-fab-label">Feedback</div>
        <div class="feedback-fab-sub">Tell us what's working</div>
    </div>
</div>

<div class="container">
<div class="logo">
    <img src="/static/logo.png" class="logo-img">
</div>

<div class="shell">
<div class="card">

    <div class="workspace-title" style="text-align:center;">
        EVOLUM STUDIO
    </div>

    <div class="workspace-copy" style="text-align:center; margin-bottom:12px;">
        Peace, {{ user_name or "Creator" }}.
    </div>

    <!-- TOP ROW -->
    <div class="choice home-module-card" style="min-height:240px; margin-bottom:16px;">

        <div class="choice-title">My Projects</div>

        <div class="choices-row" style="grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px;">

            <div class="choice" style="min-height:110px; cursor:pointer;">
                📁<br><br>
                NOT TODAY
            </div>

            <div class="choice" style="min-height:110px; cursor:pointer;">
                📁<br><br>
                COURT JESTER
            </div>

            <div class="choice" style="min-height:110px; cursor:pointer;">
                ＋<br><br>
                NEW PROJECT
            </div>

        </div>

    </div>

    <!-- BOTTOM ROW -->
    <div class="choices-row" style="grid-template-columns:repeat(3,1fr); gap:14px;">

        <div class="choice home-module-card" style="min-height:180px; cursor:pointer;">
            <div class="choice-title">Deck Generator</div>
            <div class="choice-copy" style="margin-top:20px;">
                Open Generator Modal
            </div>
        </div>

        <div class="choice home-module-card" style="min-height:180px; cursor:pointer;">
            <div class="choice-title">Image Generator</div>
            <div class="choice-copy" style="margin-top:20px;">
                Open Generator Modal
            </div>
        </div>

        <div class="choice home-module-card" style="min-height:180px; cursor:pointer;">
            <div class="choice-title">Text Generator</div>
            <div class="choice-copy" style="margin-top:20px;">
                Open Generator Modal
            </div>
        </div>

    </div>

    <div style="margin-top:14px; text-align:center;">
        <a href="/" class="secondary-button" style="text-decoration:none;padding:12px 18px;display:inline-block;">
            Back to EVOLUM Tools
        </a>
    </div>

</div>
</div>
</div>

</body>
</html>
