<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EVOLUM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #f0f2f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.card {
    background: #fff;
    border: 1px solid #e0e2e8;
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.brand { font-size: 11px; letter-spacing: 0.18em; color: #9ca3af; text-transform: uppercase; margin-bottom: 24px; }
h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 6px; }
.sub { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 18px;
}
input[type="password"]:focus { border-color: #f97316; background: #fff; }
.btn {
    width: 100%;
    padding: 12px;
    background: #f97316;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
}
.btn:hover { background: #ea6a0a; }
.error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
}
</style>
</head>
<body>
<div class="card">
    <div class="brand">EVOLUM</div>
    <h1>Admin Access</h1>
    <p class="sub">Internal use only.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus>
        <button class="btn" type="submit">Sign In</button>
    </form>
</div>
</body>
</html>
